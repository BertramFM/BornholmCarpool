<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Booking</title>
    <link rel="icon" type="image/bornholmLogo" href="images/bornholmlogo.png">

    <!-- Import CSS styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/frontpagemain.css">
    <link rel="stylesheet" href="css/bookUdlej.css">

</head>


<body style="background-color: white">
<!-- Navigation Bar -->
    <header>
        <div class="navbar">
            <a href="index.html">
                <img src="images/bornholmlogo.png" alt="Homepage" title="Home">
            </a>
            <ul>
                <li><a href="Book.html">BOOK</a></li>
                <li><a href="Udlej.html">UDLEJ</a></li>
                <li><a href="About.html">OM OS</a></li>
            </ul>
        </div>
    </header>

    <div class="booking-container background">

        <form class="booking-form" action="BookingAffirm.html">

            <!-- FRA -->
            <div class="form-group">
                <label for="from">FRA:</label>
                <select id="from" name="from">
                    <option>Rønne</option>
                    <option>Åkirkeby</option>
                    <option>Gudhjem</option>
                    <option>Nexø</option>
                    <option>Svanneke</option>
                    <option>Allinge</option>
                    <option>Tejn</option>
                </select>
            </div>

            <!-- DATO -->
            <div class="form-group">
                <label for="date">DATO:</label>
                <input type="date" id="date" name="date" required>
            </div>


            <!-- TUR/RETUR -->
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" name="return">
                    Retur Billet
                </label>
            </div>

            <button type="submit" class="book-btn">
                FIND TIDER
            </button>
        </form>

    </div>
</body>
</html>
